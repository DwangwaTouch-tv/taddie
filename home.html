<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ShopPafupi Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --primary:#0d2c6e;
  --primary-dark:#071a46;
  --primary-light:#1a4099;
  --accent:#1e50c8;
  --accent-bright:#2f6ef7;
  --bg:#f0f4fb;
  --card:#ffffff;
  --text:#0d1b3e;
  --subtext:#5a6a8a;
  --border:#dce4f5;
  --tag-bg:#e8edfb;
  --tag-text:#1a4099;
  --urgent:#e63946;
  --gold:#f4a623;
  --success:#16a34a;
  --shadow-sm:0 1px 4px rgba(13,44,110,0.06);
  --shadow-md:0 4px 16px rgba(13,44,110,0.10);
  --shadow-lg:0 8px 32px rgba(13,44,110,0.14);
  --nav-h:68px;
}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ══ NAV ══ */
nav{
  background:var(--card);
  border-bottom:1px solid var(--border);
  padding:0 18px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  height:var(--nav-h);
  position:sticky;top:0;z-index:200;
  box-shadow:var(--shadow-sm);
}

.nav-logo{
  display:flex;align-items:center;gap:12px;text-decoration:none;flex-shrink:0;
}

/* ── Logo Mark — transparent, image only ── */
.logo-mark{
  width:44px;height:44px;border-radius:0;flex-shrink:0;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:visible;
}
.logo-mark::before{display:none;}
.logo-mark svg{width:24px;height:24px;flex-shrink:0;position:relative;z-index:1;}

.logo-text-block{display:flex;flex-direction:column;line-height:1;gap:3px;}
.logo-text{
  font-family:'Sora',sans-serif;font-weight:800;font-size:1.12rem;
  background:linear-gradient(135deg,var(--primary-dark),var(--accent-bright));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:-0.4px; padding-top:20px;
}
.logo-sub{
  font-size:0.58rem;font-weight:700;color:var(--subtext);
  letter-spacing:2px;text-transform:uppercase;
}

.nav-right{display:flex;align-items:center;gap:8px;}
.nav-icon-btn{
  width:38px;height:38px;border-radius:50%;
  background:var(--tag-bg);border:1.5px solid var(--border);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;position:relative;
}
.nav-icon-btn:hover{background:var(--border);transform:scale(1.05);}
.nav-icon-btn svg{width:18px;height:18px;stroke:var(--primary);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.badge{
  position:absolute;top:-3px;right:-3px;
  width:17px;height:17px;border-radius:50%;
  background:var(--urgent);color:white;
  font-size:0.6rem;font-weight:800;
  display:flex;align-items:center;justify-content:center;
  border:2px solid white;
}

/* ══ DRAWER ══ */
.drawer-overlay{
  display:none;position:fixed;inset:0;z-index:300;
  background:rgba(7,26,70,0.45);backdrop-filter:blur(3px);
  opacity:0;transition:opacity 0.3s ease;
}
.drawer-overlay.open{display:block;opacity:1;}
.drawer{
  position:fixed;top:0;right:0;bottom:0;z-index:301;
  width:min(290px,85vw);background:var(--card);
  box-shadow:-8px 0 40px rgba(13,44,110,0.18);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform 0.32s cubic-bezier(.22,1,.36,1);
  overflow:hidden;
}
.drawer.open{transform:translateX(0);}
.drawer-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 18px 18px;border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,var(--primary-dark),var(--accent));
}
.drawer-brand{display:flex;align-items:center;gap:11px;}
.drawer-brand-logo{
  width:38px;height:38px;
  background:transparent;border:none;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.drawer-brand-logo img{width:38px;height:38px;object-fit:contain;display:block;}
.drawer-brand-text{font-family:'Sora',sans-serif;font-weight:800;font-size:1rem;color:white;letter-spacing:-0.3px;}
.drawer-close{
  width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;
  color:white;font-size:16px;transition:background 0.2s;
}
.drawer-close:hover{background:rgba(255,255,255,0.28);}
.drawer-auth{display:flex;flex-direction:column;gap:10px;padding:18px 18px 0;}
.drawer-btn-login{
  width:100%;padding:11px 0;border-radius:11px;
  font-family:'Sora',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;
  background:transparent;border:2px solid var(--primary);color:var(--primary);transition:all 0.2s;
}
.drawer-btn-login:hover{background:var(--tag-bg);}
.drawer-btn-signup{
  width:100%;padding:12px 0;border-radius:11px;
  font-family:'Sora',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;
  background:linear-gradient(135deg,var(--primary),var(--accent-bright));
  border:none;color:white;box-shadow:0 4px 14px rgba(13,44,110,0.28);transition:all 0.2s;
}
.drawer-btn-signup:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(13,44,110,0.36);}
.drawer-divider{display:flex;align-items:center;gap:10px;padding:16px 18px 0;}
.drawer-divider-line{flex:1;height:1px;background:var(--border);}
.drawer-divider-text{font-size:0.7rem;font-weight:600;color:var(--subtext);letter-spacing:0.5px;text-transform:uppercase;}
.drawer-nav-list{flex:1;overflow-y:auto;padding:10px 12px 20px;display:flex;flex-direction:column;gap:2px;}
.drawer-nav-item{
  display:flex;align-items:center;gap:12px;padding:12px 10px;border-radius:12px;
  cursor:pointer;transition:all 0.18s;font-size:0.92rem;font-weight:600;color:var(--text);
  border:none;background:none;width:100%;text-align:left;
}
.drawer-nav-item:hover{background:var(--tag-bg);color:var(--primary);}
.drawer-nav-item.active-nav{background:linear-gradient(135deg,rgba(13,44,110,0.07),rgba(47,110,247,0.08));color:var(--primary);}
.drawer-nav-item svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.drawer-nav-badge{margin-left:auto;background:var(--urgent);color:white;border-radius:10px;padding:1px 7px;font-size:0.65rem;font-weight:800;}
.drawer-footer{padding:14px 18px 20px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:10px;}
.drawer-footer-row{display:flex;align-items:center;gap:8px;font-size:0.78rem;font-weight:500;color:var(--subtext);cursor:pointer;transition:color 0.18s;}
.drawer-footer-row:hover{color:var(--primary);}
.drawer-footer-row svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:2;flex-shrink:0;}

/* ══ INVITE BANNER ══ */
.invite-banner{
  background:linear-gradient(100deg,var(--primary-dark) 0%,var(--accent) 100%);
  color:white;display:flex;align-items:center;justify-content:center;gap:10px;
  padding:11px 48px 11px 20px;font-size:0.84rem;font-weight:600;
  position:relative;overflow:hidden;
}
.invite-banner::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 60%,rgba(255,255,255,0.06));pointer-events:none;}
.invite-banner svg{width:16px;height:16px;fill:var(--gold);flex-shrink:0;}
.invite-pill{background:rgba(255,255,255,0.18);border:1px solid rgba(255,255,255,0.3);border-radius:20px;padding:3px 10px;font-size:0.78rem;font-weight:700;letter-spacing:0.2px;}
.close-btn{position:absolute;right:14px;background:rgba(255,255,255,0.15);border:none;color:white;cursor:pointer;border-radius:50%;width:24px;height:24px;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background 0.2s;}
.close-btn:hover{background:rgba(255,255,255,0.3);}

/* ══ MAIN ══ */
main{padding:0 15px 110px;max-width:480px;margin:0 auto;}

/* ── Search ── */
.search-wrap{position:relative;margin:16px 0 12px;}
.search-input{
  width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:14px;
  padding:13px 48px 13px 44px;font-family:'DM Sans',sans-serif;font-size:0.92rem;color:var(--text);
  outline:none;transition:border-color 0.25s,box-shadow 0.25s;box-shadow:var(--shadow-sm);
}
.search-input::placeholder{color:var(--subtext);}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,110,247,0.12);}
.search-icon-l{position:absolute;left:14px;top:50%;transform:translateY(-50%);}
.search-icon-l svg{width:18px;height:18px;stroke:var(--subtext);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.search-filter-btn{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:var(--primary);border:none;border-radius:9px;
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background 0.2s;
}
.search-filter-btn:hover{background:var(--accent-bright);}
.search-filter-btn svg{width:15px;height:15px;stroke:white;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* ── Categories ── */
.category-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:4px;}
.category-row::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto;display:flex;align-items:center;gap:5px;
  background:var(--card);color:var(--subtext);border-radius:22px;padding:7px 14px;
  font-size:0.81rem;font-weight:600;cursor:pointer;border:1.5px solid var(--border);
  transition:all 0.2s;white-space:nowrap;box-shadow:var(--shadow-sm);
}
.chip:hover{border-color:var(--accent);color:var(--accent);}
.chip.active{background:var(--primary);color:white;border-color:var(--primary);box-shadow:0 3px 10px rgba(13,44,110,0.22);}

/* ══ HERO CARD ══ */
.hero-card{
  background:var(--card);border-radius:22px;margin:14px 0 20px;
  box-shadow:var(--shadow-md);overflow:hidden;position:relative;
}
.hero-card-inner{padding:26px 22px 24px;}
.hero-gradient-bar{
  height:5px;
  background:linear-gradient(90deg,var(--primary-dark),var(--accent-bright),var(--primary-light));
  background-size:200% 100%;animation:barShift 4s linear infinite;
}
@keyframes barShift{0%{background-position:0%}100%{background-position:200%}}
.seeking-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,var(--primary),var(--accent-bright));
  color:white;font-family:'Sora',sans-serif;font-size:0.72rem;font-weight:800;
  letter-spacing:1.5px;padding:6px 16px;border-radius:30px;margin-bottom:16px;
  box-shadow:0 3px 10px rgba(13,44,110,0.25);
}
.seeking-badge svg{width:13px;height:13px;fill:white;}
.hero-slides{position:relative;overflow:hidden;}
.hero-slide{display:none;animation:slideIn 0.4s ease;}
.hero-slide.active{display:block;}
@keyframes slideIn{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.hero-title{font-family:'Sora',sans-serif;font-size:1.6rem;font-weight:800;color:var(--text);line-height:1.2;margin-bottom:8px;letter-spacing:-0.5px;}
.hero-title span{color:var(--accent-bright);}
.hero-sub{font-size:0.93rem;font-weight:500;color:var(--subtext);margin-bottom:20px;line-height:1.5;}
.dots{display:flex;gap:6px;justify-content:center;margin-bottom:18px;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border);transition:all 0.35s cubic-bezier(.4,0,.2,1);cursor:pointer;}
.dot.active{background:var(--primary);width:22px;border-radius:4px;}
.hero-actions{display:flex;gap:11px;}
.btn-primary{
  flex:1;background:linear-gradient(135deg,var(--primary),var(--accent-bright));
  color:white;border:none;border-radius:13px;padding:14px 0;
  font-family:'Sora',sans-serif;font-size:0.92rem;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all 0.25s;box-shadow:0 5px 16px rgba(13,44,110,0.28);letter-spacing:0.1px;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(13,44,110,0.36);}
.btn-primary:active{transform:translateY(0);}
.btn-primary svg{width:16px;height:16px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}
.btn-outline{
  flex:1;background:transparent;color:var(--primary);border:2px solid var(--primary);
  border-radius:13px;padding:12px 0;font-family:'Sora',sans-serif;font-size:0.92rem;
  font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;
  gap:7px;transition:all 0.25s;letter-spacing:0.1px;
}
.btn-outline:hover{background:var(--tag-bg);border-color:var(--accent);}
.btn-outline svg{width:14px;height:14px;stroke:var(--primary);fill:none;stroke-width:2.5;}

/* ══ SECTION LABELS ══ */
.section-header{display:flex;align-items:center;justify-content:space-between;margin:22px 0 13px;}
.section-label{display:flex;align-items:center;gap:8px;font-family:'Sora',sans-serif;font-size:0.82rem;font-weight:700;letter-spacing:0.6px;color:var(--text);text-transform:uppercase;}
.section-label .dot-accent{width:7px;height:7px;border-radius:50%;background:var(--accent-bright);}
.see-all{font-size:0.78rem;font-weight:600;color:var(--accent);cursor:pointer;display:flex;align-items:center;gap:4px;text-decoration:none;transition:color 0.2s;}
.see-all:hover{color:var(--primary);}
.see-all svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* ══ SEEKING SCROLL ══ */
.seeking-scroll{display:flex;gap:11px;overflow-x:auto;padding-bottom:6px;scrollbar-width:none;}
.seeking-scroll::-webkit-scrollbar{display:none;}
.seek-card{
  flex:0 0 186px;background:var(--card);border:1.5px solid var(--border);border-radius:15px;
  padding:13px;display:flex;align-items:center;gap:12px;cursor:pointer;
  transition:all 0.25s;box-shadow:var(--shadow-sm);
}
.seek-card:hover{border-color:var(--accent);box-shadow:0 4px 14px rgba(30,80,200,0.13);transform:translateY(-2px);}
.seek-icon{width:42px;height:42px;background:var(--tag-bg);border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.seek-icon svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.seek-name{font-weight:700;font-size:0.86rem;margin-bottom:3px;color:var(--text);}
.seek-price{color:var(--accent-bright);font-size:0.77rem;font-weight:700;font-family:'Sora',sans-serif;}
.seek-loc{color:var(--subtext);font-size:0.71rem;display:flex;align-items:center;gap:3px;margin-top:3px;}
.seek-loc svg{width:10px;height:10px;stroke:var(--subtext);fill:none;stroke-width:2;}

/* ══ QUICK SUGGESTIONS ══ */
.quick-row{display:flex;gap:9px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;}
.quick-row::-webkit-scrollbar{display:none;}
.quick-btn{
  flex:0 0 auto;display:flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  color:white;border:none;border-radius:30px;padding:10px 18px;
  font-size:0.83rem;font-weight:600;cursor:pointer;white-space:nowrap;
  transition:all 0.22s;box-shadow:0 3px 10px rgba(13,44,110,0.2);
}
.quick-btn:hover{transform:translateY(-2px);box-shadow:0 5px 15px rgba(13,44,110,0.28);}
.quick-btn svg{width:14px;height:14px;stroke:white;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;}
.quick-btn.outline{background:transparent;border:2px solid var(--primary);color:var(--primary);box-shadow:none;}
.quick-btn.outline svg{stroke:var(--primary);}
.quick-btn.outline:hover{background:var(--tag-bg);}

/* ══ LISTINGS GRID ══ */
.listings-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;}
.listing-card{background:var(--card);border-radius:17px;overflow:hidden;cursor:pointer;transition:all 0.25s;box-shadow:var(--shadow-sm);border:1.5px solid var(--border);}
.listing-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:rgba(47,110,247,0.2);}
.listing-img-wrap{position:relative;}
.listing-thumb{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:2.8rem;position:relative;overflow:hidden;}
.thumb-phone  {background:linear-gradient(135deg,#c9d6f5 0%,#e8edfb 100%);}
.thumb-laptop {background:linear-gradient(135deg,#cfd8f7 0%,#dde4f8 100%);}
.thumb-print  {background:linear-gradient(135deg,#d4e0f7 0%,#e2ebf9 100%);}
.thumb-tv     {background:linear-gradient(135deg,#c5d3f4 0%,#dbe4fa 100%);}
.thumb-audio  {background:linear-gradient(135deg,#d0d8f2 0%,#e5eafb 100%);}
.thumb-furn   {background:linear-gradient(135deg,#ccd9f6 0%,#dde6fa 100%);}
.thumb-default{background:linear-gradient(135deg,#d8dff4 0%,#e8edfb 100%);}
.listing-thumb::after{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 55%,rgba(13,28,80,0.07));}
.urgent-tag{position:absolute;top:9px;left:9px;background:var(--urgent);color:white;font-size:0.62rem;font-weight:800;letter-spacing:0.8px;padding:3px 8px;border-radius:6px;box-shadow:0 2px 6px rgba(230,57,70,0.35);animation:pulse 2s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 2px 6px rgba(230,57,70,0.35);}50%{box-shadow:0 2px 10px rgba(230,57,70,0.6);}}
.wishlist-btn{position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.85);backdrop-filter:blur(4px);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.wishlist-btn:hover{background:white;transform:scale(1.1);}
.wishlist-btn svg{width:14px;height:14px;stroke:#e63946;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.wishlist-btn.liked svg{fill:#e63946;}
.listing-body{padding:10px 12px 13px;}
.listing-title{font-weight:700;font-size:0.86rem;color:var(--text);margin-bottom:5px;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.listing-price{font-family:'Sora',sans-serif;font-size:0.98rem;font-weight:800;color:var(--primary);}
.listing-meta-row{display:flex;align-items:center;justify-content:space-between;margin-top:7px;}
.listing-loc{font-size:0.7rem;color:var(--subtext);display:flex;align-items:center;gap:3px;}
.listing-loc svg{width:10px;height:10px;stroke:var(--subtext);fill:none;stroke-width:2;}
.stars{display:flex;gap:1px;font-size:0.75rem;}
.listing-footer{display:flex;align-items:center;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);}
.seller-avatar{width:20px;height:20px;border-radius:50%;background:linear-gradient(135deg,var(--primary-light),var(--accent-bright));display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:white;font-weight:700;flex-shrink:0;}
.seller-name{font-size:0.7rem;color:var(--subtext);font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.verified-badge{display:flex;align-items:center;gap:2px;background:rgba(22,163,74,0.1);border-radius:10px;padding:2px 6px;}
.verified-badge svg{width:9px;height:9px;stroke:var(--success);fill:none;stroke-width:2.5;}
.verified-badge span{font-size:0.62rem;font-weight:700;color:var(--success);}

/* ══ TRUST STRIP ══ */
.trust-strip{display:flex;gap:0;background:var(--card);border-radius:16px;border:1.5px solid var(--border);overflow:hidden;margin:20px 0 4px;box-shadow:var(--shadow-sm);}
.trust-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:14px 6px;text-align:center;border-right:1px solid var(--border);}
.trust-item:last-child{border-right:none;}
.trust-item svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.trust-label{font-size:0.65rem;font-weight:700;color:var(--subtext);letter-spacing:0.3px;line-height:1.3;}
.trust-val{font-family:'Sora',sans-serif;font-size:0.78rem;font-weight:800;color:var(--primary);}

/* ══ SKELETON / EMPTY / ERROR ══ */
.skeleton{background:linear-gradient(90deg,var(--border) 25%,var(--tag-bg) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px;}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton-card{background:var(--card);border-radius:17px;overflow:hidden;border:1.5px solid var(--border);box-shadow:var(--shadow-sm);}
.skeleton-thumb{width:100%;aspect-ratio:1;}
.skeleton-line{height:12px;margin:10px 12px 6px;}
.skeleton-line-short{height:10px;margin:4px 12px 13px;width:55%;}
.skeleton-seek{flex:0 0 186px;background:var(--card);border:1.5px solid var(--border);border-radius:15px;padding:13px;display:flex;align-items:center;gap:12px;}
.skeleton-seek-icon{width:42px;height:42px;border-radius:11px;flex-shrink:0;}
.skeleton-seek-line{height:11px;border-radius:6px;margin-bottom:6px;}
.skeleton-seek-line-short{height:9px;border-radius:6px;width:70%;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;gap:12px;text-align:center;}
.empty-state svg{width:48px;height:48px;stroke:var(--border);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;}
.empty-state-title{font-family:'Sora',sans-serif;font-weight:700;font-size:0.95rem;color:var(--subtext);}
.empty-state-sub{font-size:0.82rem;color:var(--subtext);opacity:0.7;max-width:220px;}
.error-state{display:flex;align-items:center;gap:10px;padding:14px 16px;background:rgba(230,57,70,0.07);border:1.5px solid rgba(230,57,70,0.18);border-radius:13px;margin:8px 0;}
.error-state svg{width:18px;height:18px;stroke:var(--urgent);fill:none;stroke-width:2;flex-shrink:0;}
.error-state p{font-size:0.82rem;color:var(--urgent);font-weight:600;}
.error-state button{margin-left:auto;background:var(--urgent);color:white;border:none;border-radius:8px;padding:5px 12px;font-size:0.75rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity 0.2s;}
.error-state button:hover{opacity:0.85;}

/* ══ SPLASH LOADER ══ */
#splashLoader{
  position:fixed;inset:0;z-index:9999;
  background:var(--primary-dark);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.5s ease,visibility 0.5s ease;
}
#splashLoader.hidden{opacity:0;visibility:hidden;pointer-events:none;}

.splash-logo{
  display:flex;align-items:center;gap:18px;margin-bottom:44px;
  animation:splashLogoIn 0.6s cubic-bezier(.22,1,.36,1) both;
}
@keyframes splashLogoIn{from{opacity:0;transform:translateY(18px) scale(0.92);}to{opacity:1;transform:translateY(0) scale(1);}}

/* Splash icon — transparent, image only */
.splash-icon{
  width:80px;height:80px;
  background:transparent;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
}
.splash-icon img{width:80px;height:80px;object-fit:contain;display:block;}

.splash-wordmark{display:flex;flex-direction:column;line-height:1;}
.splash-name{font-family:'Sora',sans-serif;font-weight:800;font-size:1.9rem;color:white;letter-spacing:-0.5px;}
.splash-tagline{font-size:0.72rem;font-weight:600;color:rgba(255,255,255,0.45);margin-top:6px;letter-spacing:2.5px;text-transform:uppercase;}

.splash-bar-wrap{width:180px;height:3px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;margin-bottom:18px;animation:splashBarWrapIn 0.5s 0.25s ease both;}
@keyframes splashBarWrapIn{from{opacity:0;}to{opacity:1;}}
.splash-bar{height:100%;width:0%;border-radius:3px;background:linear-gradient(90deg,var(--accent-bright),#60a5fa);transition:width 0.35s ease;}
.splash-label{font-size:0.72rem;font-weight:600;letter-spacing:0.8px;color:rgba(255,255,255,0.35);animation:splashBarWrapIn 0.5s 0.3s ease both;}

/* ══ FAB ══ */
.fab{
  position:fixed;bottom:84px;right:18px;width:52px;height:52px;
  background:linear-gradient(135deg,var(--primary),var(--accent-bright));
  color:white;border:none;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(13,44,110,0.38);transition:all 0.25s;z-index:50;
}
.fab:hover{transform:scale(1.1) rotate(15deg);box-shadow:0 10px 28px rgba(13,44,110,0.44);}
.fab svg{width:22px;height:22px;stroke:white;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round;}

/* ══ BOTTOM NAV ══ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;background:var(--card);
  border-top:1px solid var(--border);display:flex;padding:8px 0 20px;
  z-index:100;box-shadow:0 -4px 16px rgba(13,44,110,0.07);
}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;font-size:0.67rem;font-weight:600;color:var(--subtext);transition:color 0.2s;border:none;background:none;padding:0;}
.nav-item svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;transition:stroke 0.2s;}
.nav-item.active{color:var(--primary);}
.nav-item span{line-height:1;}
.home-pill-btn{flex:0 0 auto;padding:0 4px;}
.home-pill{background:linear-gradient(135deg,var(--primary),var(--accent-bright));color:white;border-radius:30px;padding:8px 18px;display:flex;align-items:center;gap:6px;font-size:0.8rem;font-weight:700;font-family:'Sora',sans-serif;box-shadow:0 3px 10px rgba(13,44,110,0.28);border:none;cursor:pointer;transition:box-shadow 0.2s;}
.home-pill svg{width:15px;height:15px;stroke:white;fill:none;stroke-width:2.5;}

/* ══ ANIMATIONS ══ */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
.anim{opacity:0;animation:fadeUp 0.45s ease forwards;}
.anim-1{animation-delay:0.05s;}.anim-2{animation-delay:0.1s;}.anim-3{animation-delay:0.15s;}
.anim-4{animation-delay:0.2s;}.anim-5{animation-delay:0.25s;}.anim-6{animation-delay:0.3s;}
.anim-7{animation-delay:0.35s;}.anim-8{animation-delay:0.4s;}.anim-9{animation-delay:0.45s;}
.ripple{position:relative;overflow:hidden;}
.ripple::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,0.25);width:0;height:0;top:50%;left:50%;transform:translate(-50%,-50%);transition:width 0.4s,height 0.4s,opacity 0.4s;opacity:0;}
.ripple:active::after{width:200px;height:200px;opacity:0;}
</style>
</head>

<script>
const CONFIG = {
  API_BASE: 'https://api.shoppafupi.com/v1',
  REFERRAL_REWARD_LABEL: 'Earn K100 per signup',
  HERO_AUTOPLAY_MS: 3200,
};

/* ── DRAWER ── */
function openDrawer() {
  document.getElementById('navDrawer').classList.add('open');
  document.getElementById('drawerOverlay').classList.add('open');
  document.getElementById('menuBtn').setAttribute('aria-expanded', 'true');
  document.body.style.overflow = 'hidden';
}
function closeDrawer() {
  document.getElementById('navDrawer').classList.remove('open');
  document.getElementById('drawerOverlay').classList.remove('open');
  document.getElementById('menuBtn').setAttribute('aria-expanded', 'false');
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
function drawerNav(target) {
  document.querySelectorAll('.drawer-nav-item').forEach(i => i.classList.remove('active-nav'));
  event.currentTarget.classList.add('active-nav');
  closeDrawer();
}
function handleLogin()  { closeDrawer(); }
function handleSignup() { closeDrawer(); }

/* ── API SERVICE ── */
const API = {
  getCategories()        { return fetch(`${CONFIG.API_BASE}/categories`).then(r => r.json()); },
  getHeroSlides()        { return fetch(`${CONFIG.API_BASE}/hero-slides`).then(r => r.json()); },
  getTrustStats()        { return fetch(`${CONFIG.API_BASE}/stats`).then(r => r.json()); },
  getSeekingItems()      { return fetch(`${CONFIG.API_BASE}/seeks?limit=10`).then(r => r.json()); },
  getQuickSuggestions()  { return fetch(`${CONFIG.API_BASE}/quick-suggestions`).then(r => r.json()); },
  getListings({ urgent=false, category='all', limit=20 }={}) {
    const p = new URLSearchParams({ urgent, category, limit });
    return fetch(`${CONFIG.API_BASE}/listings?${p}`).then(r => r.json());
  },
  getUnreadMessageCount() {
    return fetch(`${CONFIG.API_BASE}/user/messages/unread-count`).then(r=>r.json()).then(d=>d.count);
  },
  toggleWishlist(listingId, currentWishlistId) {
    if (currentWishlistId) {
      return fetch(`${CONFIG.API_BASE}/wishlist`,{method:'DELETE',body:JSON.stringify({wishlistId:currentWishlistId}),headers:{'Content-Type':'application/json'}}).then(r=>r.json());
    }
    return fetch(`${CONFIG.API_BASE}/wishlist`,{method:'POST',body:JSON.stringify({listingId}),headers:{'Content-Type':'application/json'}}).then(r=>r.json());
  },
  search(query, category, filters={}) {
    return fetch(`${CONFIG.API_BASE}/search`,{method:'POST',body:JSON.stringify({query,category,filters}),headers:{'Content-Type':'application/json'}}).then(r=>r.json());
  },
};

/* ── ICON MAPS ── */
const CATEGORY_ICONS = {
  phone:`<svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>`,
  printer:`<svg viewBox="0 0 24 24"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>`,
  laptop:`<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
  tv:`<svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="15" rx="2"/><polyline points="17 2 12 7 7 2"/></svg>`,
  audio:`<svg viewBox="0 0 24 24"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>`,
  furniture:`<svg viewBox="0 0 24 24"><path d="M20 9V7a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v2"/><path d="M2 11v5a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-5a2 2 0 0 0-4 0v2H6v-2a4 4 0 0 0-4 0"/><line x1="6" y1="18" x2="6" y2="22"/><line x1="18" y1="18" x2="18" y2="22"/></svg>`,

const THUMB_CLASS={phone:'thumb-phone',laptop:'thumb-laptop',printer:'thumb-print',tv:'thumb-tv',audio:'thumb-audio',furniture:'thumb-furn',default:'thumb-default'};
const THUMB_EMOJI={phone:'📱',laptop:'💻',printer:'🖨️',tv:'📺',audio:'🎧',furniture:'🛋️',default:'📦'};
const TRUST_ICONS={
  shield:`<svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,
  clock:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
  check:`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`,
};
const QUICK_ICONS={
  search:`<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  info:`<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`,
  trending:`<svg viewBox="0 0 24 24"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>`,
};

/* ── HELPERS ── */
function starsHTML(rating){let s='';for(let i=1;i<=5;i++)s+=`<span style="color:${i<=rating?'var(--gold)':'var(--border)'}">★</span>`;return s;}
function skeletonCards(n){return Array.from({length:n},()=>`<div class="skeleton-card"><div class="skeleton skeleton-thumb"></div><div class="skeleton skeleton-line"></div><div class="skeleton skeleton-line-short"></div></div>`).join('');}
function skeletonSeeks(n){return Array.from({length:n},()=>`<div class="skeleton-seek"><div class="skeleton skeleton-seek-icon"></div><div style="flex:1"><div class="skeleton skeleton-seek-line"></div><div class="skeleton skeleton-seek-line-short"></div></div></div>`).join('');}
function errorBlock(msg,retryFn){const id=`err_${Math.random().toString(36).slice(2)}`;setTimeout(()=>{const b=document.getElementById(id);if(b)b.addEventListener('click',retryFn);},0);return `<div class="error-state" style="grid-column:1/-1"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><p>${msg}</p><button id="${id}">Retry</button></div>`;}
function emptyListings(){return `<div class="empty-state" style="grid-column:1/-1"><svg viewBox="0 0 24 24"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><div class="empty-state-title">No listings yet</div><div class="empty-state-sub">Check back soon — new items are added daily.</div></div>`;}

/* ── RENDER FUNCTIONS ── */
async function renderCategories(){
  const row=document.getElementById('categoryRow');
  try{
    const cats=await API.getCategories();
    row.innerHTML=cats.map((c,i)=>`<div class="chip${i===0?' active':''}" data-slug="${c.slug}">${c.emoji?c.emoji+' ':''}${c.label}</div>`).join('');
    row.querySelectorAll('.chip').forEach(chip=>{
      chip.addEventListener('click',()=>{
        row.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
        chip.classList.add('active');
        loadListings({category:chip.dataset.slug});
      });
    });
  }catch{row.innerHTML='<div class="chip active">All</div>';}
}

let heroTimer,heroCur=0;
async function renderHeroSlides(){
  const slidesEl=document.getElementById('heroSlides');
  const dotsEl=document.getElementById('heroDots');
  try{
    const slides=await API.getHeroSlides();
    slidesEl.innerHTML=slides.map((s,i)=>`<div class="hero-slide${i===0?' active':''}" data-index="${i}"><h1 class="hero-title">${s.title} <span>${s.titleHighlight}</span></h1><p class="hero-sub">${s.subtitle}</p></div>`).join('');
    dotsEl.innerHTML=slides.map((_,i)=>`<div class="dot${i===0?' active':''}" data-i="${i}"></div>`).join('');
    dotsEl.querySelectorAll('.dot').forEach(d=>d.addEventListener('click',()=>goSlide(+d.dataset.i)));
    clearInterval(heroTimer);
    heroTimer=setInterval(()=>goSlide((heroCur+1)%slides.length),CONFIG.HERO_AUTOPLAY_MS);
  }catch{
    slidesEl.innerHTML=`<div class="hero-slide active"><h1 class="hero-title">Welcome to <span>ShopPafupi</span></h1><p class="hero-sub">Search what you need . Verified sellers come to you.</p></div>`;
    dotsEl.innerHTML='<div class="dot active"></div>';
  }
}
function goSlide(n){
  const slides=document.querySelectorAll('.hero-slide');
  const dots=document.querySelectorAll('#heroDots .dot');
  if(!slides.length)return;
  slides[heroCur]?.classList.remove('active');dots[heroCur]?.classList.remove('active');
  heroCur=n;
  slides[heroCur]?.classList.add('active');dots[heroCur]?.classList.add('active');
}

async function renderTrustStats(){
  const strip=document.getElementById('trustStrip');
  try{
    const stats=await API.getTrustStats();
    strip.innerHTML=stats.map(s=>`<div class="trust-item">${TRUST_ICONS[s.iconKey]||TRUST_ICONS.check}<div class="trust-val">${s.value}</div><div class="trust-label">${s.label}</div></div>`).join('');
  }catch{strip.style.display='none';}
}

async function renderSeekingItems(){
  const scroll=document.getElementById('seekingScroll');
  scroll.innerHTML=skeletonSeeks(3);
  try{
    const items=await API.getSeekingItems();
    if(!items.length){scroll.innerHTML='<p style="font-size:0.8rem;color:var(--subtext);padding:4px 0">No active requests right now.</p>';return;}
    scroll.innerHTML=items.map(item=>`<div class="seek-card" data-id="${item.id}"><div class="seek-icon">${CATEGORY_ICONS[item.categoryKey]||CATEGORY_ICONS.default}</div><div><div class="seek-name">${item.name}</div><div class="seek-price">${item.priceLabel}</div><div class="seek-loc"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${item.location}</div></div></div>`).join('');
  }catch{scroll.innerHTML='<p style="font-size:0.8rem;color:var(--urgent);padding:4px 0">Could not load requests.</p>';}
}

async function renderQuickSuggestions(){
  const row=document.getElementById('quickRow');
  try{
    const items=await API.getQuickSuggestions();
    row.innerHTML=items.map(item=>`<button class="quick-btn${item.style==='outline'?' outline':''} ripple" data-id="${item.id}">${QUICK_ICONS[item.iconKey]||''}${item.label}</button>`).join('');
  }catch{row.innerHTML='';}
}

const wishlistState={};
async function loadListings({urgent=true,category='all'}={}){
  const grid=document.getElementById('listingsGrid');
  grid.innerHTML=skeletonCards(6);
  try{
    const listings=await API.getListings({urgent,category});
    renderListings(listings);
  }catch{
    grid.innerHTML=errorBlock('Could not load listings.',()=>loadListings({urgent,category}));
  }
}

function renderListings(listings){
  const grid=document.getElementById('listingsGrid');
  if(!listings.length){grid.innerHTML=emptyListings();return;}
  listings.forEach(l=>{if(!(l.id in wishlistState))wishlistState[l.id]=l.wishlistId||null;});
  grid.innerHTML=listings.map((l,i)=>{
    const thumbClass=THUMB_CLASS[l.categoryKey]||THUMB_CLASS.default;
    const emoji=THUMB_EMOJI[l.categoryKey]||THUMB_EMOJI.default;
    const liked=!!wishlistState[l.id];
    const delay=0.35+(i*0.05);
    return `<div class="listing-card anim" style="animation-delay:${delay}s" data-id="${l.id}"><div class="listing-img-wrap"><div class="listing-thumb ${thumbClass}">${emoji}</div>${l.isUrgent?'<span class="urgent-tag">URGENT</span>':''}<button class="wishlist-btn${liked?' liked':''}" data-listing-id="${l.id}" onclick="handleWishlist(this)"><svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></button></div><div class="listing-body"><div class="listing-title">${l.title}</div><div class="listing-price">${l.price}</div><div class="listing-meta-row"><div class="listing-loc"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${l.location}</div><div class="stars">${starsHTML(l.rating)}</div></div><div class="listing-footer"><div class="seller-avatar">${l.seller.initials}</div><div class="seller-name">${l.seller.name}</div>${l.seller.isVerified?`<div class="verified-badge"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg><span>Verified</span></div>`:''}</div></div></div>`;
  }).join('');
}

async function renderUnreadBadge(){
  try{
    const count=await API.getUnreadMessageCount();
    const btn=document.getElementById('msgBtn');
    const existing=btn.querySelector('.badge');
    if(existing)existing.remove();
    if(count>0){
      const badge=document.createElement('div');
      badge.className='badge';
      badge.textContent=count>99?'99+':count;
      btn.appendChild(badge);
      const db=document.getElementById('drawerMsgBadge');
      db.textContent=count>99?'99+':count;
      db.style.display='';
    }
  }catch{}
}

/* ── EVENT HANDLERS ── */
async function handleWishlist(btn){
  const listingId=+btn.dataset.listingId;
  const currentWlId=wishlistState[listingId]||null;
  const willLike=!currentWlId;
  btn.classList.toggle('liked',willLike);
  const svg=btn.querySelector('svg');
  svg.style.transition='transform 0.2s';
  svg.style.transform='scale(1.3)';
  setTimeout(()=>{svg.style.transform='scale(1)';},200);
  try{
    const result=await API.toggleWishlist(listingId,currentWlId);
    wishlistState[listingId]=result.wishlistId||null;
  }catch{btn.classList.toggle('liked',!!currentWlId);}
}

let searchDebounce;
document.getElementById('searchInput').addEventListener('input',e=>{
  clearTimeout(searchDebounce);
  const q=e.target.value.trim();
  if(!q){loadListings();return;}
  searchDebounce=setTimeout(async()=>{
    const grid=document.getElementById('listingsGrid');
    grid.innerHTML=skeletonCards(4);
    try{
      const results=await API.search(q,activeCategory());
      renderListings(results);
    }catch{grid.innerHTML=errorBlock('Search failed.',()=>{});}
  },380);
});

function activeCategory(){const chip=document.querySelector('.chip.active');return chip?chip.dataset.slug:'all';}
function setNav(el){document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));el.classList.add('active');}

document.getElementById('postRequestBtn').addEventListener('click',()=>{});
document.getElementById('viewAllBtn').addEventListener('click',()=>{});
document.getElementById('fab').addEventListener('click',()=>{});
document.getElementById('seeAllListings').addEventListener('click',e=>e.preventDefault());
document.getElementById('seeAllSeeks').addEventListener('click',e=>e.preventDefault());
document.getElementById('filterBtn').addEventListener('click',()=>{});
document.getElementById('closeBanner').addEventListener('click',()=>{document.getElementById('inviteBanner').style.display='none';});

/* ── BOOT ── */
(async function init(){
  const splashBar=document.getElementById('splashBar');
  const splashLabel=document.getElementById('splashLabel');
  const splash=document.getElementById('splashLoader');
  const TASKS=6;let done=0;
  function tick(label){done++;splashBar.style.width=`${Math.round((done/TASKS)*100)}%`;splashLabel.textContent=label;}
  document.getElementById('inviteReward').textContent=CONFIG.REFERRAL_REWARD_LABEL;
  await Promise.all([
    renderCategories()      .then(()=>tick('Loading categories…')).catch(()=>tick('Loading categories…')),
    renderHeroSlides()      .then(()=>tick('Loading hero…'))      .catch(()=>tick('Loading hero…')),
    renderTrustStats()      .then(()=>tick('Loading stats…'))     .catch(()=>tick('Loading stats…')),
    renderSeekingItems()    .then(()=>tick('Loading requests…'))  .catch(()=>tick('Loading requests…')),
    renderQuickSuggestions().then(()=>tick('Almost there…'))      .catch(()=>tick('Almost there…')),
    renderUnreadBadge()     .then(()=>tick('Done!'))              .catch(()=>tick('Done!')),
  ]);
  splashBar.style.width='100%';
  await new Promise(r=>setTimeout(r,320));
  splash.classList.add('hidden');
  splash.addEventListener('transitionend',()=>splash.remove(),{once:true});
  loadListings({urgent:true});
})();
</script>
