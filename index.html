<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MY LOVE TADDIE</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Poppins', sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(-45deg,#050505,#140010,#2b0018,#000000);
      background-size:400% 400%;
      animation:bgMove 12s ease infinite;
      position:relative;
    }

    @keyframes bgMove{
      0%{background-position:0% 50%;}
      50%{background-position:100% 50%;}
      100%{background-position:0% 50%;}
    }

    /* Floating Background Text */
    .bg-text{
      position:absolute;
      width:100%;
      height:100%;
      overflow:hidden;
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      align-items:center;
      opacity:0.06;
      pointer-events:none;
      z-index:1;
    }

    .bg-text span{
      color:#ff4d88;
      font-size:30px;
      font-weight:700;
      margin:12px;
      animation:floatText 8s linear infinite;
      text-shadow:0 0 15px #ff0055;
    }

    @keyframes floatText{
      0%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-15px);
      }
      100%{
        transform:translateY(0px);
      }
    }

    /* Center Container */
    .container{
      position:relative;
      z-index:10;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
    }

    /* Main Heart */
    .heart{
      position:relative;
      width:180px;
      height:180px;
      background:linear-gradient(145deg,#ff003c,#ff4d6d);
      transform:rotate(-45deg);
      animation:heartbeat 1s infinite;
      box-shadow:
        0 0 25px #ff004c,
        0 0 60px #ff004c,
        0 0 120px #ff004c;
    }

    .heart::before,
    .heart::after{
      content:'';
      position:absolute;
      width:180px;
      height:180px;
      background:linear-gradient(145deg,#ff003c,#ff4d6d);
      border-radius:50%;
    }

    .heart::before{
      top:-90px;
      left:0;
    }

    .heart::after{
      left:90px;
      top:0;
    }

    @keyframes heartbeat{
      0%{
        transform:rotate(-45deg) scale(1);
      }
      25%{
        transform:rotate(-45deg) scale(1.1);
      }
      50%{
        transform:rotate(-45deg) scale(1);
      }
      75%{
        transform:rotate(-45deg) scale(1.18);
      }
      100%{
        transform:rotate(-45deg) scale(1);
      }
    }

    /* Glowing Ring */
    .ring{
      position:absolute;
      width:350px;
      height:350px;
      border:2px solid rgba(255,255,255,0.08);
      border-radius:50%;
      animation:rotateRing 10s linear infinite;
      box-shadow:0 0 40px rgba(255,0,100,0.3);
    }

    @keyframes rotateRing{
      from{
        transform:rotate(0deg);
      }
      to{
        transform:rotate(360deg);
      }
    }

    /* Love Message */
    .message{
      position:absolute;
      text-align:center;
      color:white;
      font-size:42px;
      font-weight:700;
      letter-spacing:3px;
      text-shadow:
        0 0 10px #ff4d88,
        0 0 20px #ff4d88,
        0 0 40px #ff0055;
      animation:glowText 2s infinite alternate;
      z-index:20;
    }

    @keyframes glowText{
      from{
        opacity:0.8;
      }
      to{
        opacity:1;
        transform:scale(1.03);
      }
    }

    /* Floating Hearts */
    .small-heart{
      position:absolute;
      color:#ff4d88;
      font-size:20px;
      animation:rise linear infinite;
      opacity:0.8;
    }

    @keyframes rise{
      0%{
        transform:translateY(100vh) scale(0.5);
        opacity:0;
      }
      20%{
        opacity:1;
      }
      100%{
        transform:translateY(-120vh) scale(1.4);
        opacity:0;
      }
    }

    /* Sparkles */
    .spark{
      position:absolute;
      width:4px;
      height:4px;
      background:white;
      border-radius:50%;
      box-shadow:0 0 15px white;
      animation:twinkle 2s infinite alternate;
    }

    @keyframes twinkle{
      from{
        opacity:0.2;
        transform:scale(1);
      }
      to{
        opacity:1;
        transform:scale(2);
      }
    }

    @media(max-width:768px){
      .message{
        font-size:28px;
      }

      .heart,
      .heart::before,
      .heart::after{
        width:130px;
        height:130px;
      }

      .heart::before{
        top:-65px;
      }

      .heart::after{
        left:65px;
      }

      .ring{
        width:260px;
        height:260px;
      }
    }

  </style>
</head>

<body>

  <!-- Background Text -->
  <div class="bg-text" id="bgText"></div>

  <!-- Sparkles -->
  <div id="sparkContainer"></div>

  <!-- Floating Hearts -->
  <div id="heartsContainer"></div>

  <!-- Main Content -->
  <div class="container">

    <div class="ring"></div>

    <div class="heart"></div>

    <div class="message">
      ❤️ I LOVE YOU TADDIE ❤️
    </div>

  </div>

  <script>

    /* Background Repeated Text */
    const bg = document.getElementById("bgText");

    for(let i = 0; i < 250; i++){
      let span = document.createElement("span");
      span.innerText = "I LOVE YOU TADDIE";
      bg.appendChild(span);
    }

    /* Floating Hearts Generator */
    const heartsContainer = document.getElementById("heartsContainer");

    function createHeart(){
      const heart = document.createElement("div");
      heart.classList.add("small-heart");

      heart.innerHTML = "❤";

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.animationDuration = (4 + Math.random() * 6) + "s";
      heart.style.fontSize = (15 + Math.random() * 35) + "px";

      heartsContainer.appendChild(heart);

      setTimeout(()=>{
        heart.remove();
      },10000);
    }

    setInterval(createHeart,250);

    /* Sparkles Generator */
    const sparkContainer = document.getElementById("sparkContainer");

    for(let i = 0; i < 120; i++){

      const spark = document.createElement("div");
      spark.classList.add("spark");

      spark.style.left = Math.random() * 100 + "vw";
      spark.style.top = Math.random() * 100 + "vh";

      spark.style.animationDuration =
        (1 + Math.random() * 3) + "s";

      sparkContainer.appendChild(spark);
    }

  </script>

</body>
</html>
